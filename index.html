<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>STARMAP</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="scene"></div>

  <div class="hud-loading" id="hud-loading" aria-live="polite">
    <div class="hud-loading-label">LOADING CATALOG</div>
    <div class="hud-loading-bar"><div class="hud-loading-fill" id="hud-loading-fill"></div></div>
    <div class="hud-loading-meta" id="hud-loading-meta">— / — MB</div>
  </div>

  <div class="hud" aria-hidden="true">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <header class="hud-header">
      <div class="hud-title">STARMAP</div>
      <div class="hud-sub">LOCAL&nbsp;CLUSTER&nbsp;//&nbsp;HYG&nbsp;V4.2</div>
    </header>

    <aside class="hud-view-toggle">
      <div class="hud-line dim">VIEW</div>
      <div class="hud-toggle" role="tablist">
        <button class="hud-toggle-btn active" data-view="ext" role="tab" aria-selected="true">ORBIT</button>
        <button class="hud-toggle-btn"        data-view="sol" role="tab" aria-selected="false">FROM SOL</button>
      </div>
      <div class="hud-line dim hud-toggle-section">OVERLAYS</div>
      <div class="hud-toggle">
        <button class="hud-toggle-btn active" id="toggle-constellations" aria-pressed="true">CONSTELLATIONS</button>
      </div>
    </aside>

    <footer class="hud-footer">
      <div class="hud-footer-left">
        <div class="hud-line" id="hud-hint">DRAG TO ORBIT · PINCH/SCROLL TO ZOOM</div>
      </div>
      <div class="hud-range">
        <div class="hud-range-row">
          <span class="hud-line dim">RANGE</span>
          <span class="hud-line"><span id="range-value">--.-</span>&nbsp;PC</span>
        </div>
        <input type="range" id="range-slider" class="hud-slider"
               min="0" max="200" step="0.5" value="14.24"
               aria-label="render range in parsecs" />
      </div>
      <div class="hud-footer-right">
        <div class="hud-line dim" id="hud-count">--- SYSTEMS</div>
      </div>
    </footer>
  </div>

  <script type="module" src="./starmap.js"></script>
</body>
</html>
